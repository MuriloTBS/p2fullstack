services:

  mysql:
    image: mysql:8.0
    container_name: p2_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: p2_database
      MYSQL_USER: p2user
      MYSQL_PASSWORD: p2password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - p2_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: p2_backend
    restart: unless-stopped
    environment:
      APP_NAME: P2FullStack
      APP_ENV: production
      APP_KEY: base64:aRPFkh+VrVdXCXUPNr3Ak9bXgIXz2JZrqGLwEJxIksc=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: p2_database
      DB_USERNAME: p2user
      DB_PASSWORD: p2password
      SESSION_DRIVER: file
      CACHE_STORE: file
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - p2_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: p2_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - p2_network

networks:
  p2_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
